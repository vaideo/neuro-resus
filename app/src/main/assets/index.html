<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neuro Resus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ── Inline SVG Icon Factory ─────────────────────────────────────────── */
    const mkIcon = (html) => ({ className = "w-5 h-5", style, ...p }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2" strokeLinecap="round"
           strokeLinejoin="round" className={className} style={style} {...p}
           dangerouslySetInnerHTML={{__html: html}} />
    );

    const Activity    = mkIcon('<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>');
    const Brain       = mkIcon('<path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>');
    const AlertTriangle = mkIcon('<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>');
    const Pill        = mkIcon('<path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/><path d="m8.5 8.5 7 7"/>');
    const HeartPulse  = mkIcon('<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>');
    const ShieldAlert = mkIcon('<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M12 8v4"/><path d="M12 16h.01"/>');
    const FileText    = mkIcon('<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>');
    const CheckSquare = mkIcon('<path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>');
    const List        = mkIcon('<line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/>');
    const ChevronRight= mkIcon('<path d="m9 18 6-6-6-6"/>');
    const AlertCircle = mkIcon('<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>');
    const Syringe     = mkIcon('<path d="m18 2 4 4"/><path d="m17 7 3-3"/><path d="M19 9 8.7 19.3c-1 1-2.5 1-3.4 0l-.6-.6c-1-1-1-2.5 0-3.4L15 5"/><path d="m9 11 4 4"/><path d="m5 19-3 3"/><path d="m14 4 6 6"/>');
    const Stethoscope = mkIcon('<path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/>');
    const Info        = mkIcon('<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>');
    const Droplet     = mkIcon('<path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/>');

    /* ── NIHSS Data ──────────────────────────────────────────────────────── */
    const NIHSS_DATA = [
      { id: '1a', title: '1a. Level of Consciousness', options: [{v:0,l:'0 - Alert'},{v:1,l:'1 - Not alert; easily arousable'},{v:2,l:'2 - Not alert; requires repeated stimulation'},{v:3,l:'3 - Unresponsive or reflex only'}] },
      { id: '1b', title: '1b. LOC Questions (Month, Age)', options: [{v:0,l:'0 - Answers both correctly'},{v:1,l:'1 - Answers one correctly'},{v:2,l:'2 - Answers neither correctly'}] },
      { id: '1c', title: '1c. LOC Commands (Open/close eyes, grip)', options: [{v:0,l:'0 - Performs both tasks correctly'},{v:1,l:'1 - Performs one task correctly'},{v:2,l:'2 - Performs neither task correctly'}] },
      { id: '2',  title: '2. Best Gaze', options: [{v:0,l:'0 - Normal'},{v:1,l:'1 - Partial gaze palsy'},{v:2,l:'2 - Forced deviation'}] },
      { id: '3',  title: '3. Visual Fields', options: [{v:0,l:'0 - No visual loss'},{v:1,l:'1 - Partial hemianopia'},{v:2,l:'2 - Complete hemianopia'},{v:3,l:'3 - Bilateral hemianopia (blind)'}] },
      { id: '4',  title: '4. Facial Palsy', options: [{v:0,l:'0 - Normal'},{v:1,l:'1 - Minor paralysis'},{v:2,l:'2 - Partial paralysis'},{v:3,l:'3 - Complete paralysis'}] },
      { id: '5a', title: '5a. Motor Left Arm', options: [{v:0,l:'0 - No drift for 10s'},{v:1,l:'1 - Drift, does not hit bed'},{v:2,l:'2 - Some effort against gravity'},{v:3,l:'3 - No effort against gravity'},{v:4,l:'4 - No movement'}] },
      { id: '5b', title: '5b. Motor Right Arm', options: [{v:0,l:'0 - No drift for 10s'},{v:1,l:'1 - Drift, does not hit bed'},{v:2,l:'2 - Some effort against gravity'},{v:3,l:'3 - No effort against gravity'},{v:4,l:'4 - No movement'}] },
      { id: '6a', title: '6a. Motor Left Leg', options: [{v:0,l:'0 - No drift for 5s'},{v:1,l:'1 - Drift, does not hit bed'},{v:2,l:'2 - Some effort against gravity'},{v:3,l:'3 - No effort against gravity'},{v:4,l:'4 - No movement'}] },
      { id: '6b', title: '6b. Motor Right Leg', options: [{v:0,l:'0 - No drift for 5s'},{v:1,l:'1 - Drift, does not hit bed'},{v:2,l:'2 - Some effort against gravity'},{v:3,l:'3 - No effort against gravity'},{v:4,l:'4 - No movement'}] },
      { id: '7',  title: '7. Limb Ataxia', options: [{v:0,l:'0 - Absent'},{v:1,l:'1 - Present in one limb'},{v:2,l:'2 - Present in two limbs'}] },
      { id: '8',  title: '8. Sensory', options: [{v:0,l:'0 - Normal'},{v:1,l:'1 - Mild-to-moderate loss'},{v:2,l:'2 - Severe-to-total loss'}] },
      { id: '9',  title: '9. Best Language', options: [{v:0,l:'0 - No aphasia'},{v:1,l:'1 - Mild-to-moderate aphasia'},{v:2,l:'2 - Severe aphasia'},{v:3,l:'3 - Mute, global aphasia'}] },
      { id: '10', title: '10. Dysarthria', options: [{v:0,l:'0 - Normal'},{v:1,l:'1 - Mild-to-moderate'},{v:2,l:'2 - Severe, unintelligible'}] },
      { id: '11', title: '11. Extinction/Inattention', options: [{v:0,l:'0 - No abnormality'},{v:1,l:'1 - Inattention in 1 modality'},{v:2,l:'2 - Profound hemi-inattention'}] }
    ];

    /* ── Main App ────────────────────────────────────────────────────────── */
    function App() {
      const [activeTab, setActiveTab] = useState('algorithms');
      const [menuOpen, setMenuOpen] = useState(false);

      const [nihss, setNihss] = useState({});
      const [aspects, setAspects] = useState({ C:true,L:true,IC:true,I:true,M1:true,M2:true,M3:true,M4:true,M5:true,M6:true });
      const [aspectsType, setAspectsType] = useState('anterior');
      const [pcAspects, setPcAspects] = useState({ L_Thal:true,R_Thal:true,L_PCA:true,R_PCA:true,L_Cer:true,R_Cer:true,L_Mid:true,R_Mid:true,L_Pons:true,R_Pons:true });

      const calculateNIHSS = () => Object.values(nihss).reduce((a,b)=>a+b,0);
      const getNIHSSSeverity = (s) => s===0?'Normal (0)':s<=4?'Minor Stroke (1-4)':s<=15?'Moderate Stroke (5-15)':s<=20?'Moderate to Severe (16-20)':'Severe Stroke (21-42)';
      const calculateASPECTS = () => Object.values(aspects).filter(v=>v).length;
      const calculatePcASPECTS = () => Object.values(pcAspects).filter(v=>v).length;
      const handleNIHSSChange = (id,val) => setNihss(p=>({...p,[id]:val}));
      const toggleASPECTS = (r) => setAspects(p=>({...p,[r]:!p[r]}));
      const togglePcASPECTS = (r) => setPcAspects(p=>({...p,[r]:!p[r]}));

      const pcLabels = {L_Thal:"L Thalamus",R_Thal:"R Thalamus",L_PCA:"L PCA Cortex",R_PCA:"R PCA Cortex",L_Cer:"L Cerebellum",R_Cer:"R Cerebellum",L_Mid:"L Midbrain",R_Mid:"R Midbrain",L_Pons:"L Pons",R_Pons:"R Pons"};

      const TABS = [
        { id:'algorithms',        label:'Decision Algorithms',       icon:<Activity className="w-5 h-5"/> },
        { id:'nihss',             label:'NIHSS Calculator',          icon:<CheckSquare className="w-5 h-5"/> },
        { id:'aspects',           label:'ASPECTS Scoring',           icon:<Brain className="w-5 h-5"/> },
        { id:'thrombolytics',     label:'Thrombolytics Guide',       icon:<Droplet className="w-5 h-5"/> },
        { id:'contraindications', label:'IVT Contraindications',     icon:<ShieldAlert className="w-5 h-5"/> },
        { id:'monitoring',        label:'Peri-Procedure Monitoring', icon:<HeartPulse className="w-5 h-5"/> },
        { id:'complications',     label:'Complications (sICH)',      icon:<AlertTriangle className="w-5 h-5"/> },
        { id:'antithrombotics',   label:'Antithrombotic Guidelines', icon:<Pill className="w-5 h-5"/> },
        { id:'etiology',          label:'Etiology (TOAST/ASCOD)',    icon:<FileText className="w-5 h-5"/> },
      ];

      const activeLabel = TABS.find(t=>t.id===activeTab)?.label || '';

      return (
        <div className="flex flex-col h-full bg-slate-50 font-sans text-slate-800">

          {/* ── Mobile Top Bar ── */}
          <header className="bg-slate-900 text-white px-4 py-3 flex items-center justify-between shadow-lg z-20 flex-shrink-0">
            <div className="flex items-center gap-2">
              <Activity className="w-6 h-6 text-blue-400" />
              <div>
                <div className="text-base font-bold leading-tight">Neuro Resus</div>
                <div className="text-xs text-slate-400 leading-tight">2026 AHA/ASA Ed.</div>
              </div>
            </div>
            <button onClick={()=>setMenuOpen(o=>!o)} className="p-2 rounded-lg hover:bg-slate-700 transition-colors">
              <div className="w-5 h-0.5 bg-white mb-1 rounded"></div>
              <div className="w-5 h-0.5 bg-white mb-1 rounded"></div>
              <div className="w-5 h-0.5 bg-white rounded"></div>
            </button>
          </header>

          {/* ── Slide-out Menu ── */}
          {menuOpen && (
            <div className="fixed inset-0 z-30 flex">
              <div className="w-72 bg-slate-900 text-slate-300 flex flex-col h-full shadow-2xl overflow-y-auto">
                <div className="p-4 border-b border-slate-800 flex items-center justify-between">
                  <span className="text-white font-bold">Menu</span>
                  <button onClick={()=>setMenuOpen(false)} className="text-slate-400 text-xl leading-none">✕</button>
                </div>
                <ul className="py-3 px-3 space-y-1">
                  {TABS.map(tab=>(
                    <li key={tab.id}>
                      <button
                        onClick={()=>{setActiveTab(tab.id);setMenuOpen(false);}}
                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors ${activeTab===tab.id?'bg-blue-600 text-white font-medium':'hover:bg-slate-800 hover:text-white'}`}
                      >
                        {tab.icon}
                        <span className="text-sm">{tab.label}</span>
                      </button>
                    </li>
                  ))}
                </ul>
              </div>
              <div className="flex-1 bg-black bg-opacity-50" onClick={()=>setMenuOpen(false)}></div>
            </div>
          )}

          {/* ── Current Tab Label ── */}
          <div className="bg-white border-b border-slate-200 px-4 py-2 flex-shrink-0">
            <p className="text-sm font-semibold text-blue-700">{activeLabel}</p>
          </div>

          {/* ── Scrollable Content ── */}
          <main className="flex-1 overflow-y-auto p-4">
            <div className="max-w-2xl mx-auto pb-8">

              {/* ALGORITHMS */}
              {activeTab === 'algorithms' && (
                <div className="space-y-4">
                  <h2 className="text-2xl font-bold text-slate-900">Acute Stroke Decision Algorithms</h2>
                  <p className="text-slate-500 text-sm">Integrating 2026 AHA/ASA &amp; ESO 2021 protocols</p>

                  {/* IVT Algorithm */}
                  <div className="bg-white rounded-xl shadow-sm border border-blue-100 overflow-hidden">
                    <div className="bg-blue-600 p-4 text-white flex items-center gap-2">
                      <Syringe className="w-5 h-5" />
                      <h3 className="font-bold text-base">Intravenous Thrombolysis (IVT)</h3>
                    </div>
                    <div className="p-4 space-y-3">
                      <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
                        <h4 className="font-bold text-blue-900 mb-1">Window: 0 – 4.5 Hours</h4>
                        <p className="text-sm text-slate-700">Are neurological deficits <strong>DISABLING</strong>?</p>
                        <ul className="mt-3 space-y-2 text-sm">
                          <li className="flex gap-2 items-start">
                            <CheckSquare className="w-4 h-4 text-green-600 mt-0.5 flex-shrink-0" />
                            <span><strong>YES:</strong> Proceed with <strong>Tenecteplase</strong> (0.25 mg/kg IV, max 25mg) or Alteplase. Do not delay for advanced imaging.</span>
                          </li>
                          <li className="flex gap-2 items-start">
                            <AlertTriangle className="w-4 h-4 text-amber-600 mt-0.5 flex-shrink-0" />
                            <span><strong>NO:</strong> IVT not recommended. Use DAPT (Aspirin 325mg + Clopidogrel 300mg load) instead.</span>
                          </li>
                        </ul>
                      </div>
                      <div className="bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded-r-lg">
                        <h4 className="font-bold text-indigo-900 mb-1">Window: 4.5 – 9 Hours or Wake-Up</h4>
                        <p className="text-sm text-slate-700">Requires advanced imaging: MRI DWI-FLAIR mismatch OR CT/MRI Perfusion mismatch criteria.</p>
                      </div>
                      <div className="text-xs text-slate-500 bg-slate-50 p-3 rounded border border-slate-200">
                        <strong>★ 2026 Update:</strong> Tenecteplase (TNK) is equally endorsed within 4.5h window. Single IV bolus preferred if bridging to EVT.
                      </div>
                    </div>
                  </div>

                  {/* EVT Algorithm */}
                  <div className="bg-white rounded-xl shadow-sm border border-emerald-100 overflow-hidden">
                    <div className="bg-emerald-600 p-4 text-white flex items-center gap-2">
                      <Activity className="w-5 h-5" />
                      <h3 className="font-bold text-base">Endovascular Thrombectomy (EVT)</h3>
                    </div>
                    <div className="p-4 space-y-3">
                      <div className="bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-lg">
                        <h4 className="font-bold text-emerald-900 mb-1">Standard Window (0–6 hours)</h4>
                        <ul className="text-sm space-y-1 text-slate-700 list-disc ml-4">
                          <li>NIHSS ≥ 6 (or lower if disabling)</li>
                          <li>LVO on CTA (ICA, M1, select M2)</li>
                          <li>Pre-stroke mRS 0–1</li>
                          <li>ASPECTS ≥ 6</li>
                        </ul>
                      </div>
                      <div className="bg-teal-50 border-l-4 border-teal-500 p-4 rounded-r-lg">
                        <h4 className="font-bold text-teal-900 mb-1">Extended Window (6–24 hours)</h4>
                        <p className="text-sm text-slate-700">Apply DAWN or DEFUSE-3 criteria (requires advanced imaging).</p>
                      </div>
                      <div className="bg-amber-50 border border-amber-200 p-4 rounded-lg">
                        <h4 className="font-bold text-amber-900 flex items-center gap-2 text-sm mb-2">
                          <AlertCircle className="w-4 h-4" /> ★ 2026 AHA EVT Updates
                        </h4>
                        <ul className="text-sm space-y-2 text-amber-900">
                          <li><strong>Basilar Artery Occlusion:</strong> EVT strongly recommended within 24h if NIHSS ≥ 10.</li>
                          <li><strong>Large Core Infarcts:</strong> EVT now recommended for select patients with large cores ({'>'} 70mL or lower ASPECTS).</li>
                        </ul>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* NIHSS */}
              {activeTab === 'nihss' && (
                <div className="space-y-4">
                  <div className="flex flex-col gap-3">
                    <div>
                      <h2 className="text-2xl font-bold text-slate-900">NIHSS Calculator</h2>
                      <p className="text-slate-500 text-sm mt-1">National Institutes of Health Stroke Scale</p>
                    </div>
                    <div className="bg-blue-50 px-4 py-3 rounded-xl border border-blue-100 text-center">
                      <div className="text-xs text-blue-600 font-semibold mb-1">TOTAL SCORE</div>
                      <div className="text-4xl font-bold text-blue-900">{calculateNIHSS()} / 42</div>
                      <div className="text-sm text-slate-600 mt-1">{getNIHSSSeverity(calculateNIHSS())}</div>
                    </div>
                  </div>
                  <div className="space-y-3">
                    {NIHSS_DATA.map(item => (
                      <div key={item.id} className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                        <h3 className="font-semibold text-slate-800 mb-3 text-sm">{item.title}</h3>
                        <div className="space-y-2">
                          {item.options.map(opt => (
                            <label key={opt.v} className={`flex items-center p-3 rounded-lg border cursor-pointer transition-all ${nihss[item.id]===opt.v?'bg-blue-50 border-blue-500 ring-1 ring-blue-500':'bg-slate-50 border-slate-200'}`}>
                              <input type="radio" name={`nihss-${item.id}`} className="sr-only" checked={nihss[item.id]===opt.v} onChange={()=>handleNIHSSChange(item.id,opt.v)} />
                              <span className="text-sm text-slate-700">{opt.l}</span>
                            </label>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>setNihss({})} className="w-full px-6 py-3 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg font-medium transition-colors">
                    Reset Calculator
                  </button>
                </div>
              )}

              {/* ASPECTS */}
              {activeTab === 'aspects' && (
                <div className="space-y-4">
                  <h2 className="text-2xl font-bold text-slate-900">ASPECTS Score</h2>
                  <div className="flex bg-slate-200 p-1 rounded-lg">
                    <button className={`flex-1 py-2 rounded-md font-medium text-sm transition ${aspectsType==='anterior'?'bg-white shadow text-slate-900':'text-slate-600'}`} onClick={()=>setAspectsType('anterior')}>Anterior (MCA)</button>
                    <button className={`flex-1 py-2 rounded-md font-medium text-sm transition ${aspectsType==='posterior'?'bg-white shadow text-slate-900':'text-slate-600'}`} onClick={()=>setAspectsType('posterior')}>Posterior (PC)</button>
                  </div>
                  <div className="bg-slate-900 text-white p-4 rounded-xl text-center">
                    <div className="text-xs text-slate-400 mb-1">TOTAL {aspectsType==='anterior'?'ASPECTS':'PC-ASPECTS'}</div>
                    <div className="text-5xl font-bold">{aspectsType==='anterior'?calculateASPECTS():calculatePcASPECTS()}</div>
                    <div className="text-sm text-slate-400 mt-1">/ 10</div>
                  </div>
                  <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <p className="text-slate-600 text-xs mb-3">Tap to toggle. Deduct 1 point per region with early ischemic changes.</p>
                    {aspectsType==='anterior' ? (
                      <div className="grid grid-cols-2 gap-3">
                        {Object.keys(aspects).map(r => (
                          <button key={r} onClick={()=>toggleASPECTS(r)} className={`p-3 rounded border font-medium flex justify-between items-center text-sm transition-colors ${aspects[r]?'bg-emerald-50 border-emerald-200 text-emerald-800':'bg-red-50 border-red-200 text-red-800 opacity-70'}`}>
                            <span>Region {r}</span><span>{aspects[r]?'+1':'-1'}</span>
                          </button>
                        ))}
                      </div>
                    ) : (
                      <div className="grid grid-cols-2 gap-3">
                        {Object.keys(pcAspects).map(r => (
                          <button key={r} onClick={()=>togglePcASPECTS(r)} className={`p-3 rounded border font-medium flex justify-between items-center text-sm transition-colors ${pcAspects[r]?'bg-emerald-50 border-emerald-200 text-emerald-800':'bg-red-50 border-red-200 text-red-800 opacity-70'}`}>
                            <span className="text-xs">{pcLabels[r]}</span><span>{pcAspects[r]?'+1':'-1'}</span>
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                  <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl text-sm">
                    <h4 className="font-bold text-blue-900 mb-2">Reference Guide</h4>
                    {aspectsType==='anterior' ? (
                      <ul className="space-y-1 text-blue-800 text-xs">
                        <li><strong>C:</strong> Caudate &nbsp; <strong>L:</strong> Lentiform &nbsp; <strong>IC:</strong> Internal Capsule</li>
                        <li><strong>I:</strong> Insular Ribbon &nbsp; <strong>M1-M6:</strong> MCA Cortex regions</li>
                      </ul>
                    ) : (
                      <ul className="space-y-1 text-blue-800 text-xs">
                        <li><strong>Thalamus / PCA Cortex / Midbrain / Pons / Cerebellum</strong> — 1 pt each side</li>
                      </ul>
                    )}
                  </div>
                  <div className="bg-amber-50 border border-amber-200 p-3 rounded-xl text-xs text-amber-900">
                    <strong>★ 2026:</strong> EVT now endorsed for select patients with lower ASPECTS (Large Core trials). PC-ASPECTS strongly supports EVT decisions for basilar artery occlusions.
                  </div>
                </div>
              )}

              {/* THROMBOLYTICS */}
              {activeTab === 'thrombolytics' && (
                <div className="space-y-4">
                  <h2 className="text-2xl font-bold text-slate-900">Thrombolytics Guide</h2>
                  <p className="text-slate-500 text-sm">Dosing, preparation, and administration</p>

                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="bg-blue-600 p-4 text-white flex items-center gap-2">
                      <Droplet className="w-5 h-5" />
                      <h3 className="font-bold">Alteplase (tPA / Activase)</h3>
                    </div>
                    <div className="p-4 space-y-3 text-slate-700">
                      <div className="bg-blue-50 border border-blue-200 p-3 rounded-lg text-sm">
                        <strong className="text-blue-900 block mb-1">Dosing</strong>
                        <span className="text-2xl font-bold text-blue-700">0.9 mg/kg</span> <span className="text-sm">(Max: 90 mg)</span>
                      </div>
                      <ul className="space-y-2 text-sm">
                        <li className="flex gap-2"><CheckSquare className="w-4 h-4 text-blue-500 flex-shrink-0 mt-0.5" /><div><strong>Administration:</strong> 10% bolus over 1 min → 90% infused over 60 min.</div></li>
                        <li className="flex gap-2"><Syringe className="w-4 h-4 text-blue-500 flex-shrink-0 mt-0.5" /><div><strong>Formulation:</strong> 50mg / 100mg vials. Reconstitute to <strong>1 mg/mL</strong> with sterile water.</div></li>
                        <li className="flex gap-2"><AlertCircle className="w-4 h-4 text-blue-500 flex-shrink-0 mt-0.5" /><div><strong>Flush:</strong> NS after infusion. Do NOT mix with other meds.</div></li>
                      </ul>
                    </div>
                  </div>

                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="bg-indigo-600 p-4 text-white flex items-center gap-2">
                      <Droplet className="w-5 h-5" />
                      <h3 className="font-bold">Tenecteplase (TNK / TNKase)</h3>
                    </div>
                    <div className="p-4 space-y-3 text-slate-700">
                      <div className="bg-indigo-50 border border-indigo-200 p-3 rounded-lg text-sm">
                        <strong className="text-indigo-900 block mb-1">Dosing</strong>
                        <span className="text-2xl font-bold text-indigo-700">0.25 mg/kg</span> <span className="text-sm">(Max: 25 mg)</span>
                      </div>
                      <ul className="space-y-2 text-sm">
                        <li className="flex gap-2"><CheckSquare className="w-4 h-4 text-indigo-500 flex-shrink-0 mt-0.5" /><div><strong>Administration:</strong> Single IV bolus over <strong>5 seconds</strong>. No infusion pump needed.</div></li>
                        <li className="flex gap-2"><Syringe className="w-4 h-4 text-indigo-500 flex-shrink-0 mt-0.5" /><div><strong>Formulation:</strong> 50mg vial. Reconstitute with 10 mL sterile water → <strong>5 mg/mL</strong>.</div></li>
                        <li className="flex gap-2"><AlertCircle className="w-4 h-4 text-indigo-500 flex-shrink-0 mt-0.5" /><div><strong>Flush:</strong> NS before and after. <em>Incompatible with Dextrose.</em></div></li>
                      </ul>
                    </div>
                  </div>

                  <div className="bg-slate-900 text-slate-300 p-4 rounded-xl flex gap-3 items-start text-sm">
                    <Info className="w-5 h-5 text-indigo-400 flex-shrink-0 mt-0.5" />
                    <div>
                      <strong className="text-white">Why TNK is preferred in 2026:</strong>
                      <p className="mt-1 text-xs">TNK's single-bolus is highly advantageous for "Drip and Ship" — avoids managing a continuous IV pump during transport to an EVT-capable center.</p>
                    </div>
                  </div>
                </div>
              )}

              {/* CONTRAINDICATIONS */}
              {activeTab === 'contraindications' && (
                <div className="space-y-4">
                  <h2 className="text-2xl font-bold text-slate-900">IVT Contraindications</h2>
                  <p className="text-slate-500 text-sm">Screen carefully before Alteplase/Tenecteplase</p>

                  <div className="bg-red-50 border-l-4 border-red-600 rounded-xl overflow-hidden shadow-sm">
                    <div className="bg-red-100 px-4 py-3 flex items-center gap-2">
                      <ShieldAlert className="w-5 h-5 text-red-700" />
                      <h3 className="font-bold text-red-900">Absolute Contraindications</h3>
                    </div>
                    <div className="p-4">
                      <ul className="space-y-3 text-sm">
                        {[
                          'CT showing hemorrhage, established infarct >1/3 MCA, or structural risk lesion',
                          'Significant head trauma or prior stroke within 3 months',
                          'Myocardial infarction within 3 months (Anterior/Inferolateral STEMI)',
                          'GI or urinary tract hemorrhage within 21 days',
                          'Major surgery within 14 days',
                          'History of intracranial hemorrhage',
                          'BP: systolic >185 or diastolic >110 mmHg that cannot be safely reduced',
                          'Platelet count < 100,000/mm³',
                          'Heparin within 48h + elevated aPTT',
                          'INR > 1.7 or recent DOAC use (unless reversal confirmed)',
                          'Blood glucose < 50 mg/dL or > 400 mg/dL (treat and reassess)',
                        ].map((item,i) => (
                          <li key={i} className="flex gap-2 items-start">
                            <AlertTriangle className="w-4 h-4 text-red-500 flex-shrink-0 mt-0.5" />
                            <span className="text-slate-800">{item}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  </div>

                  <div className="bg-amber-50 border border-amber-200 rounded-xl overflow-hidden shadow-sm">
                    <div className="bg-amber-100 px-4 py-3 flex items-center gap-2">
                      <Info className="w-5 h-5 text-amber-700" />
                      <h3 className="font-bold text-amber-900">Relative Contraindications</h3>
                    </div>
                    <div className="p-4">
                      <p className="text-xs text-amber-900 font-medium mb-3">★ 2026 AHA: Some now require clinical judgment and shared decision-making.</p>
                      <ul className="space-y-2 text-sm">
                        {[
                          'Seizure at onset if residual deficits are suspected stroke-related',
                          'Pregnancy (may be considered in life-threatening situations)',
                          'Recent arterial puncture at non-compressible site within 7 days',
                          'Rapidly improving symptoms — if DISABLING deficits persist, still treat. Non-disabling → DAPT instead.',
                        ].map((item,i) => (
                          <li key={i} className="flex gap-2 items-start">
                            <ChevronRight className="w-4 h-4 text-amber-600 flex-shrink-0 mt-0.5" />
                            <span className="text-slate-800">{item}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  </div>
                </div>
              )}

              {/* MONITORING */}
              {activeTab === 'monitoring' && (
                <div className="space-y-4">
                  <h2 className="text-2xl font-bold text-slate-900">Peri-Procedure Monitoring</h2>
                  <p className="text-slate-500 text-sm">Physiological Targets &amp; Vitals for all AIS Patients</p>

                  <div className="space-y-3">
                    {[
                      { label:'Blood Pressure', icon:<HeartPulse className="w-4 h-4 text-red-500"/>, ivt:'< 180 / 105 mmHg × 24h', evt:'Avoid intensive < 140 mmHg. Individualize. Avoid < 90 mmHg.' },
                      { label:'Glucose', icon:<Activity className="w-4 h-4 text-blue-500"/>, ivt:'140–180 mg/dL', evt:'Target 140-180. Intensive 80-130 NOT recommended. Avoid severe hypoglycemia.' },
                    ].map((row,i) => (
                      <div key={i} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="bg-slate-100 px-4 py-2 flex items-center gap-2 border-b border-slate-200">
                          {row.icon}
                          <span className="font-semibold text-slate-800 text-sm">{row.label}</span>
                        </div>
                        <div className="p-3 grid grid-cols-2 gap-3 text-xs">
                          <div className="bg-red-50 p-2 rounded"><strong className="text-red-800 block mb-1">Post-IVT</strong>{row.ivt}</div>
                          <div className="bg-amber-50 p-2 rounded"><strong className="text-amber-800 block mb-1">Post-EVT (2026)</strong>{row.evt}</div>
                        </div>
                      </div>
                    ))}
                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
                      <div className="flex items-center gap-2 mb-2">
                        <Stethoscope className="w-4 h-4 text-slate-500" />
                        <strong className="text-sm text-slate-800">Neuro Checks</strong>
                      </div>
                      <p className="text-xs text-slate-700"><strong>Post-IVT:</strong> q15min during infusion → q30min × 6h → q1h × 16h</p>
                      <p className="text-xs text-slate-700 mt-1"><strong>Post-EVT:</strong> q1-2h for first 24h</p>
                    </div>
                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
                      <div className="flex items-center gap-2 mb-2">
                        <CheckSquare className="w-4 h-4 text-emerald-500" />
                        <strong className="text-sm text-slate-800">O₂ / Temperature / Dysphagia</strong>
                      </div>
                      <p className="text-xs text-slate-700"><strong>SpO₂:</strong> ≥ 94% (avoid hyperoxia)</p>
                      <p className="text-xs text-slate-700 mt-1"><strong>Temp:</strong> 36–37.5°C. Scheduled paracetamol for fever.</p>
                      <p className="text-xs text-slate-700 mt-1"><strong>Dysphagia:</strong> Formal screen before ANY oral intake. NPO if failed → SLP consult in 24h.</p>
                    </div>
                  </div>

                  <div className="bg-slate-900 text-slate-200 p-4 rounded-xl flex gap-3 items-start shadow-md">
                    <AlertTriangle className="w-6 h-6 text-amber-500 flex-shrink-0" />
                    <div>
                      <h3 className="text-white font-bold mb-1 text-sm">Pre-tPA BP Management</h3>
                      <p className="text-xs">Target: <strong>≤ 185/110 mmHg</strong></p>
                      <p className="text-xs mt-1 text-slate-400"><strong>1st Line:</strong> Labetalol 10–20 mg IV over 1–2 min (repeat q10m, max 300mg)</p>
                      <p className="text-xs mt-0.5 text-slate-400"><strong>2nd Line:</strong> Nicardipine 5 mg/h IV OR Clevidipine 1-2 mg/h</p>
                    </div>
                  </div>
                </div>
              )}

              {/* COMPLICATIONS */}
              {activeTab === 'complications' && (
                <div className="space-y-4">
                  <h2 className="text-2xl font-bold text-slate-900">Complications Management</h2>
                  <p className="text-slate-500 text-sm">Protocol for Symptomatic Intracerebral Hemorrhage (sICH)</p>

                  <div className="bg-red-50 border-2 border-red-500 rounded-xl p-4">
                    <div className="flex items-center gap-3 mb-3">
                      <div className="bg-red-600 text-white w-9 h-9 rounded-full flex items-center justify-center font-bold text-xl">!</div>
                      <h3 className="font-bold text-red-900">Post-IVT Hemorrhage Action Plan</h3>
                    </div>
                    <p className="text-red-800 font-medium text-sm mb-4">Suspect sICH if NIHSS worsens by ≥ 4 points, severe headache, N/V, or acute hypertension.</p>

                    <div className="space-y-3">
                      {[
                        { n:'1', color:'bg-red-500', title:'STOP Infusion', body:'Immediately halt Alteplase or Tenecteplase if still running.' },
                        { n:'2', color:'bg-slate-800', title:'STAT Imaging', body:'Urgent Non-Contrast CT Head. Draw CBC, PT/PTT, Fibrinogen, Type & Screen.' },
                        { n:'3', color:'bg-blue-500', title:'Reversal Agents', body:'• Cryoprecipitate: 10 units IV\n• Tranexamic Acid (TXA): 1g IV\n• Platelets: 6-8 units if indicated' },
                        { n:'4', color:'bg-purple-500', title:'Surgical Consult', body:'Urgent Neurosurgery for possible evacuation or EVD placement.' },
                      ].map(step => (
                        <div key={step.n} className="flex gap-3 items-start">
                          <div className={`${step.color} text-white w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm flex-shrink-0`}>{step.n}</div>
                          <div className="bg-white p-3 rounded shadow-sm border border-slate-200 flex-1">
                            <div className="font-bold text-slate-900 text-sm">{step.title}</div>
                            <div className="text-slate-700 text-xs mt-1 whitespace-pre-line">{step.body}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* ANTITHROMBOTICS */}
              {activeTab === 'antithrombotics' && (
                <div className="space-y-4">
                  <h2 className="text-2xl font-bold text-slate-900">Antithrombotic Guidelines</h2>
                  <p className="text-slate-500 text-sm">Secondary Prevention Initiation Timing</p>
                  <div className="bg-yellow-50 border-l-4 border-yellow-400 p-3 rounded text-xs text-yellow-900 font-medium">
                    ⚠ Do NOT give antiplatelets/anticoagulants for 24h after IVT. Obtain CT at 24h first.
                  </div>
                  <div className="space-y-3">
                    {[
                      { icon:<List className="w-5 h-5"/>, color:'bg-blue-100 text-blue-700', title:'Non-Cardioembolic Minor Stroke', sub:'NIHSS ≤ 3 or High-risk TIA (ABCD2 ≥ 4)', body:'DAPT: Initiate Immediately.\nAspirin 325mg + Clopidogrel 300mg load → ASA 81mg + Clop 75mg × 21-90 days, then monotherapy.\n★ 2026: Strongly endorsed for non-disabling AIS within 4.5h over IVT.' },
                      { icon:<HeartPulse className="w-5 h-5"/>, color:'bg-red-100 text-red-700', title:'Cardioembolic (Atrial Fibrillation)', sub:'DOACs preferred over Warfarin for non-valvular AF', body:'Timing: 4 to 14 days based on infarct size/severity.\nAgents: Apixaban 5mg BID, Rivaroxaban 20mg OD, Dabigatran 150mg BID.\nAvoid long-term dual therapy unless compelling cardiac indication.' },
                      { icon:<Activity className="w-5 h-5"/>, color:'bg-purple-100 text-purple-700', title:'Symptomatic Carotid Stenosis (50-99%)', sub:'', body:'Antiplatelet + Urgent CEA (≤ 14 days) or CAS.\nCEA preferred in surgical candidates; CAS for poor surgical risk.' },
                    ].map((item,i) => (
                      <div key={i} className="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                        <div className="flex gap-3 items-start">
                          <div className={`${item.color} p-2 rounded-lg mt-0.5`}>{item.icon}</div>
                          <div className="flex-1">
                            <h3 className="font-bold text-slate-800 text-sm">{item.title}</h3>
                            {item.sub && <p className="text-xs text-slate-500 mt-0.5 mb-2">{item.sub}</p>}
                            <div className="bg-slate-50 p-3 rounded border border-slate-200 text-xs text-slate-700 whitespace-pre-line mt-1">{item.body}</div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ETIOLOGY */}
              {activeTab === 'etiology' && (
                <div className="space-y-4">
                  <h2 className="text-2xl font-bold text-slate-900">Stroke Etiology Classification</h2>
                  <p className="text-slate-500 text-sm">TOAST and ASCOD Phenotyping Reference</p>

                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="bg-slate-800 p-4 text-white">
                      <h3 className="font-bold">TOAST Classification</h3>
                      <p className="text-slate-300 text-xs mt-0.5">Trial of Org 10172 in Acute Stroke Treatment</p>
                    </div>
                    <div className="p-4 space-y-2">
                      {[
                        ['1. Large-artery atherosclerosis','Clinical/imaging evidence of >50% stenosis or occlusion of a major brain artery (e.g., carotid, MCA, basilar).'],
                        ['2. Cardioembolism','Arterial occlusion due to embolus from the heart (e.g., AFib, prosthetic valve, LV thrombus).'],
                        ['3. Small-vessel occlusion (Lacunar)','Infarct <1.5 cm in deep brain structures, presenting with classic lacunar syndrome.'],
                        ['4. Other determined etiology','Rare causes: non-atherosclerotic vasculopathies, hypercoagulable states, hematologic disorders.'],
                        ['5. Undetermined etiology','Cryptogenic; no cause found despite workup, or ≥2 potential competing causes.'],
                      ].map(([title,desc],i) => (
                        <div key={i} className="p-3 bg-slate-50 rounded border border-slate-100">
                          <strong className="text-slate-800 block text-sm">{title}</strong>
                          <span className="text-xs text-slate-600">{desc}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="bg-indigo-600 p-4 text-white">
                      <h3 className="font-bold">ASCOD Phenotyping</h3>
                      <p className="text-indigo-200 text-xs mt-0.5">Phenotypic grading for acute ischemic stroke</p>
                    </div>
                    <div className="p-4 space-y-3">
                      <div className="bg-indigo-50 border border-indigo-100 rounded-lg p-3 text-sm">
                        <p className="text-indigo-900 text-xs mb-2">Grade each category. Example: <strong>A1-S0-C3-O0-D0</strong></p>
                        <div className="grid grid-cols-5 gap-2 text-center text-xs font-bold text-indigo-900">
                          {['A','S','C','O','D'].map(l => <div key={l} className="bg-white rounded p-1 border border-indigo-200">{l}</div>)}
                        </div>
                        <div className="grid grid-cols-5 gap-2 text-center text-xs text-indigo-700 mt-1">
                          {['Athero','Small vessel','Cardiac','Other','Dissection'].map(l => <div key={l}>{l}</div>)}
                        </div>
                      </div>
                      <h4 className="font-bold text-slate-800 text-xs uppercase tracking-wider border-b pb-1">Grading Scale</h4>
                      {[
                        ['1','red','Potentially causal: Disease is the most likely cause.'],
                        ['2','amber','Causality uncertain: Present but direct link unclear.'],
                        ['3','blue','Unlikely causal: Present but unlikely cause.'],
                        ['0','slate','Absent: Disease confirmed absent.'],
                        ['9','slate','Insufficient: Workup incomplete.'],
                      ].map(([n,c,desc]) => (
                        <div key={n} className="flex gap-2 items-start">
                          <span className={`w-6 h-6 rounded bg-${c}-100 text-${c}-800 flex items-center justify-center font-bold text-xs flex-shrink-0`}>{n}</span>
                          <span className="text-xs text-slate-700">{desc}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
